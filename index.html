<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Login | Naufal Fahri BaiHaqi</title>
</head>
<body>

    <div class="login-container">
        <h2>Selamat Datang</h2>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan Username kamu" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Masukkan password kamu" required>
            </div>
            
            <button type="submit">Masuk</button>
        </form>

        <div>
            Belum punya akun? <a href="#">Daftar sekarang</a>
        </div>
    </div>

</body>
</html>
